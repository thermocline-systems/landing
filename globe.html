<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Thermocline — Globe</title>
  <style>
    :root {
      --bg: #1c1d1f;
      --fg: #e8edf2;
      --muted: #8b9097;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: "Helvetica Neue", Helvetica, "Inter", Arial, sans-serif;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* thermal sheen behind the globe */
    body::before {
      content: "";
      position: fixed;
      inset: -20%;
      background:
        radial-gradient(38% 38% at 50% 50%, rgba(79, 195, 227, 0.14), transparent 62%),
        radial-gradient(40% 50% at 22% 28%, rgba(240, 90, 40, 0.12), transparent 70%),
        radial-gradient(45% 55% at 78% 72%, rgba(45, 175, 230, 0.12), transparent 70%);
      filter: blur(50px);
      z-index: 0;
      pointer-events: none;
    }

    #globe {
      position: fixed;
      inset: 0;
      z-index: 1;
    }

    .overlay {
      position: fixed;
      z-index: 2;
      pointer-events: none;
    }

    .brand {
      top: clamp(24px, 5vw, 48px);
      left: clamp(24px, 5vw, 48px);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 0.98;
      font-size: clamp(30px, 5vw, 56px);
    }

    .brand .grad {
      background: linear-gradient(95deg, #ef4b2b 0%, #f1b13a 30%, #7bd44a 60%, #4fc3e3 82%, #2db4e6 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .brand .tm {
      font-size: 0.2em;
      font-weight: 600;
      color: var(--muted);
      vertical-align: super;
      margin-left: 0.1em;
    }

    .caption {
      bottom: clamp(24px, 5vw, 44px);
      left: clamp(24px, 5vw, 48px);
      color: var(--muted);
      font-size: 14px;
      max-width: 38ch;
      line-height: 1.5;
    }

    .loading {
      position: fixed;
      inset: 0;
      z-index: 3;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 15px;
      transition: opacity 0.4s ease;
    }
    .loading.hidden { opacity: 0; pointer-events: none; }

    /* control pills: heat/freeze blend slider + projection picker */
    .controls,
    .projctl {
      top: clamp(24px, 5vw, 48px);
      right: clamp(24px, 5vw, 48px);
      display: flex;
      align-items: center;
      gap: 3px;
      padding: 4px;
      border-radius: 999px;
      background: rgba(20, 22, 26, 0.6);
      border: 1px solid rgba(232, 237, 242, 0.1);
      backdrop-filter: blur(8px);
      pointer-events: auto;
    }
    /* the blend pill holds icons + a slider, so a little side padding */
    .controls { gap: 9px; padding: 5px 13px; }
    /* projection picker sits just under the blend pill */
    .projctl {
      top: calc(clamp(24px, 5vw, 48px) + 50px);
    }

    .ctl-ic { display: flex; color: var(--muted); }
    .ctl-ic svg { width: 16px; height: 16px; display: block; }
    .ctl-ic.end { cursor: pointer; outline: none; transition: color 0.15s ease; }
    .ctl-ic.end:hover,
    .ctl-ic.end:focus-visible { color: var(--fg); }

    #blendSlider {
      -webkit-appearance: none;
      appearance: none;
      width: 96px;
      height: 5px;
      border-radius: 999px;
      outline: none;
      cursor: pointer;
      /* heat (warm) -> freeze (purple) */
      background: linear-gradient(90deg, #f59e0b, #ef4444, #7c3aed);
    }
    #blendSlider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 15px; height: 15px; border-radius: 50%;
      background: var(--fg); border: 2px solid #0e0f10;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.5);
    }
    #blendSlider::-moz-range-thumb {
      width: 15px; height: 15px; border-radius: 50%;
      background: var(--fg); border: 2px solid #0e0f10;
    }

    .projctl .pseg {
      appearance: none;
      border: 0;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 34px;
      height: 34px;
      padding: 0;
      color: var(--muted);
      background: transparent;
      border-radius: 999px;
      transition: color 0.2s ease, background 0.2s ease;
    }
    .projctl .pseg svg { width: 18px; height: 18px; display: block; }
    .projctl .pseg:hover { color: var(--fg); }
    .projctl .pseg.active { color: #0e0f10; background: var(--fg); }

    /* subtle current-projection name above the map */
    .projname {
      top: clamp(22px, 4.5vh, 42px);
      left: 50%;
      transform: translateX(-50%);
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      opacity: 0.7;
      pointer-events: none;
      transition: opacity 0.2s ease;
      white-space: nowrap;
    }

    /* flat / projected map view */
    .flatview {
      position: fixed;
      inset: 0;
      z-index: 1;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 8vh 4vw 12vh;
    }
    #projCanvas {
      max-width: 94vw;
      max-height: 80vh;
      width: auto;
      height: auto;
    }

    /* legend */
    .legend {
      bottom: clamp(24px, 5vw, 44px);
      right: clamp(24px, 5vw, 48px);
      width: clamp(180px, 26vw, 240px);
      text-align: right;
    }
    .legend-bar {
      height: 7px;
      border-radius: 999px;
      margin-bottom: 7px;
    }
    .legend-ends {
      display: flex;
      justify-content: space-between;
      color: var(--muted);
      font-size: 11px;
      letter-spacing: 0.01em;
    }
    .legend-label {
      margin-top: 8px;
      color: var(--fg);
      font-size: 13px;
      font-weight: 600;
    }
    .legend-sub {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }

    /* loop-temperature slider */
    .tempctl {
      left: 50%;
      bottom: clamp(22px, 4vw, 40px);
      transform: translateX(-50%);
      width: min(440px, 78vw);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      pointer-events: auto;
    }
    .temp-label {
      font-size: 14px;
      font-weight: 600;
      color: var(--fg);
      letter-spacing: -0.01em;
    }
    .temp-label .temp-sub {
      color: var(--muted);
      font-weight: 400;
    }
    #tempSlider {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 6px;
      border-radius: 999px;
      outline: none;
      cursor: pointer;
      /* cold -> hot track */
      /* hot — shades of warm into deep red */
      background: linear-gradient(90deg, #fde68a, #fbbf24, #fb923c, #f97316, #ef4444, #dc2626, #991b1b, #7f1d1d);
    }
    #tempSlider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--fg);
      border: 2px solid #0e0f10;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.5);
    }
    #tempSlider::-moz-range-thumb {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--fg);
      border: 2px solid #0e0f10;
    }
  </style>
</head>
<body>
  <div id="globe"></div>

  <div class="overlay brand">
    <span class="grad">Dry is cool.</span><span class="tm">™</span>
  </div>
  <div class="overlay caption">
    © <span id="year">2026</span> Thermocline
  </div>

  <div class="overlay projname" id="projName"></div>

  <div class="overlay controls" id="controls">
    <span class="ctl-ic end" data-end="heat" role="button" tabindex="0"
          title="All heat" aria-label="Slide to heat">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2.5M12 19.5V22M2 12h2.5M19.5 12H22M4.9 4.9l1.8 1.8M17.3 17.3l1.8 1.8M19.1 4.9l-1.8 1.8M6.7 17.3l-1.8 1.8"/></svg>
    </span>
    <input id="blendSlider" type="range" min="0" max="1" step="0.02" value="0"
           title="Blend heat ⟷ freeze" aria-label="Blend heat and freeze" />
    <span class="ctl-ic end" data-end="freeze" role="button" tabindex="0"
          title="All freeze" aria-label="Slide to freeze">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M3.3 7l17.4 10M20.7 7L3.3 17"/><path d="M9.6 3.6 12 5l2.4-1.4M9.6 20.4 12 19l2.4 1.4M3.5 9.7 4.8 12l-1.3 2.3M20.5 9.7 19.2 12l1.3 2.3" stroke-width="1.3"/></svg>
    </span>
  </div>

  <div class="overlay projctl" id="projctl">
    <button class="pseg active" data-view="globe" title="Globe" aria-label="Globe">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M3 12h18"/><path d="M12 3c2.6 2.6 2.6 15.4 0 18M12 3c-2.6 2.6-2.6 15.4 0 18"/></svg>
    </button>
    <button class="pseg" data-view="mercator" title="Mercator" aria-label="Mercator">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="5.5" y="4" width="13" height="16" rx="1.5"/><path d="M5.5 12h13M12 4v16"/></svg>
    </button>
    <button class="pseg" data-view="robinson" title="Robinson" aria-label="Robinson">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"><path d="M4 7.5c5-2 11-2 16 0v9c-5 2-11 2-16 0z"/><path d="M4 12h16M12 6.7v10.6"/></svg>
    </button>
    <button class="pseg" data-view="august" title="August" aria-label="August">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"><path d="M12 6c6 .5 8 4 8 6s-2 5.5-8 6c-6-.5-8-4-8-6s2-5.5 8-6z"/><path d="M4 12h16"/></svg>
    </button>
    <button class="pseg" data-view="vandergrinten" title="Van der Grinten" aria-label="Van der Grinten">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="12" r="8.5"/><path d="M3.5 12h17M12 3.5v17"/></svg>
    </button>
  </div>

  <div class="flatview" id="flat">
    <canvas id="projCanvas"></canvas>
  </div>

  <div class="overlay legend" id="legend">
    <div class="legend-bar" id="legendBar"></div>
    <div class="legend-ends"><span id="legendLo"></span><span id="legendHi"></span></div>
    <div class="legend-label" id="legendLabel"></div>
  </div>

  <div class="overlay tempctl" id="tempctl">
    <div class="temp-label">
      <span id="tempVal">45</span>&deg;C loop
      <span class="temp-sub">&middot; pure-dry to <span id="tempDry">42.5</span>&deg;C ambient</span>
    </div>
    <input id="tempSlider" type="range" min="40" max="60" step="1" value="45"
           aria-label="Loop temperature" />
  </div>

  <div class="loading" id="loading">Loading globe…</div>

  <script src="https://unpkg.com/three@0.158.0/build/three.min.js"></script>
  <script src="https://unpkg.com/globe.gl@2.32.0/dist/globe.gl.min.js"></script>
  <script src="https://unpkg.com/d3@7/dist/d3.min.js"></script>
  <script src="https://unpkg.com/d3-geo-projection@4/dist/d3-geo-projection.min.js"></script>
  <script>
    const COUNTRIES_URL =
      "https://unpkg.com/globe.gl@2.32.0/example/datasets/ne_110m_admin_0_countries.geojson";
    const US_STATES_URL =
      "https://cdn.jsdelivr.net/gh/PublicaMundi/MappingAPI@master/data/geojson/us-states.json";

    // The 3D globe is an enhancement: if WebGL is unavailable it must not break
    // the page — the flat projections (canvas + d3) work without it.
    let world = null, globeOK = false;
    try {
      world = Globe()(document.getElementById("globe"))
        .backgroundColor("rgba(0,0,0,0)")
        .showGlobe(true)
        // atmosphere off: its back-side shader punched dark "rays" through the
        // overlay's transparent oceans; the CSS halo gives the limb glow.
        .showAtmosphere(false)
        .globeMaterial(
          // opaque so the far side never shows through
          new THREE.MeshPhongMaterial({ color: 0x16171a })
        );
      // gentle auto-rotation
      world.controls().autoRotate = true;
      world.controls().autoRotateSpeed = 0.55;
      world.controls().enableDamping = true;
      globeOK = true;
    } catch (e) {
      console.warn("3D globe unavailable (WebGL); using flat projections.", e);
    }

    // color borders along the brand gradient by latitude band
    const gradStops = ["#ef4b2b", "#f1903a", "#f1b13a", "#aed24a", "#7bd44a", "#4fc3e3", "#2db4e6"];
    function bandColor(lat) {
      // map lat (-90..90) -> 0..1 -> gradient stop
      const t = (lat + 90) / 180;
      const i = Math.min(gradStops.length - 1, Math.floor(t * gradStops.length));
      return gradStops[i];
    }

    function centroidLat(feature) {
      try {
        const coords = feature.geometry.coordinates.flat(Infinity);
        let sum = 0, n = 0;
        for (let k = 1; k < coords.length; k += 2) { sum += coords[k]; n++; }
        return n ? sum / n : 0;
      } catch (e) { return 0; }
    }

    // dim a hex color by alpha for secondary (state) borders
    function dim(hex, alpha) {
      const n = parseInt(hex.slice(1), 16);
      return `rgba(${(n >> 16) & 255}, ${(n >> 8) & 255}, ${n & 255}, ${alpha})`;
    }

    // geojson border features, shared by the globe and the projected views
    const FEATURES = { country: [], state: [] };

    // Country + US-state borders, drawn as thin strokes ON TOP of the heatmap.
    Promise.all([
      fetch(COUNTRIES_URL).then((r) => r.json()),
      fetch(US_STATES_URL).then((r) => r.json()).catch(() => ({ features: [] })),
    ])
      .then(([countries, states]) => {
        const countryFeatures = (countries.features || [])
          .filter((f) => f.properties.ISO_A2 !== "AQ")
          .map((f) => ((f._kind = "country"), f));
        const stateFeatures = (states.features || []).map(
          (f) => ((f._kind = "state"), f)
        );

        // share the border features with the projected (flat) views
        FEATURES.country = countryFeatures;
        FEATURES.state = stateFeatures;
        scheduleRender(); // refresh the flat view now that borders exist

        if (globeOK) {
          // Zero transition + accessors BEFORE the data so the borders appear
          // instantly in their final position (no enter / grow-in animation).
          world
            .polygonsTransitionDuration(0)
            .polygonCapColor(() => "rgba(0,0,0,0)")
            .polygonSideColor(() => "rgba(0,0,0,0)")
            .polygonStrokeColor((f) =>
              f._kind === "state"
                ? "rgba(232, 237, 242, 0.14)"
                : "rgba(232, 237, 242, 0.4)"
            )
            .polygonAltitude(() => 0.006)
            .polygonsData([...countryFeatures, ...stateFeatures]);

          // Lift the strokes above the heatmap (renderOrder) as globe.gl creates
          // them; depthTest stays on so the opaque globe hides far-side lines.
          let frames = 0;
          const liftBorders = () => {
            world.scene().traverse((o) => {
              if ((o.isLine || o.isLineSegments) && o.material) {
                o.renderOrder = 6;
                o.material.depthTest = true;
                o.material.transparent = true;
              }
            });
            if (++frames < 90) requestAnimationFrame(liftBorders);
          };
          requestAnimationFrame(liftBorders);
        }
      })
      .catch((e) => console.warn("Border data failed to load.", e));

    // responsive sizing (globe only)
    function size() {
      if (globeOK) world.width(window.innerWidth).height(window.innerHeight);
    }
    window.addEventListener("resize", size);
    if (globeOK) {
      size();
      world.pointOfView({ lat: 25, lng: 10, altitude: 2.4 });
    }

    // ---- climate overlays (equirectangular textures painted on the sphere) ----
    const OVERLAYS = {
      heat: {
        url: "overlay/heat_frames/loop_45.png",
        label: "Adiabatic-assist demand",
        sub: "Where pure-dry cooling needs a hand.",
        stops: ["#19c3e6", "#38bdf8", "#a3e635", "#facc15", "#f59e0b", "#ef4444"],
        lo: "Pure dry",
        hi: "Adiabatic",
      },
      freeze: {
        url: "overlay/freeze_antifreeze_overlay.png",
        label: "Anti-freeze mode",
        sub: "Where glycol runs year-round.",
        stops: ["#1a2433", "#b794f4", "#9b6ef0", "#7c3aed", "#5b21b6", "#3b0a78"],
        lo: "Never",
        hi: "Year-round",
      },
    };

    const meshes = {}; // globe overlay spheres (empty when WebGL is unavailable)
    if (globeOK) {
      // Find the base globe mesh, then attach overlays to its PARENT GROUP. The
      // borders live in that group's frame, but the base mesh carries a -90° spin
      // they don't — so attach to the group and re-apply +90° to line up.
      let baseGlobe = null;
      world.scene().traverse((o) => {
        if (
          o.isMesh &&
          o.geometry &&
          o.geometry.type === "SphereGeometry" &&
          o.geometry.parameters.radius === 100 &&
          o.material.type === "MeshPhongMaterial"
        ) {
          baseGlobe = o;
        }
      });
      const globeGroup = (baseGlobe && baseGlobe.parent) || world.scene();

      // OVERLAY ALIGNMENT — equirectangular textures only need a longitude spin
      // to line up with the borders. Nudge OVERLAY_LON_DEG if the heatmap drifts.
      const OVERLAY_LON_DEG = -90;
      const OVERLAY_LAT_DEG = 0;
      const OVERLAY_FLIP_X = false;

      const loader = new THREE.TextureLoader();
      const maxAniso = world.renderer().capabilities.getMaxAnisotropy();
      let bump = 0.4;
      Object.entries(OVERLAYS).forEach(([key, cfg]) => {
        const tex = loader.load(cfg.url);
        tex.colorSpace = THREE.SRGBColorSpace;
        tex.anisotropy = maxAniso;
        const mesh = new THREE.Mesh(
          new THREE.SphereGeometry(100 + bump, 128, 128),
          new THREE.MeshBasicMaterial({
            map: tex,
            transparent: true,
            depthTest: false,
            depthWrite: false,
            side: THREE.FrontSide,
            opacity: 0,
          })
        );
        bump += 0.1;
        mesh.renderOrder = 3;
        mesh.rotation.set(
          (OVERLAY_LAT_DEG * Math.PI) / 180,
          (OVERLAY_LON_DEG * Math.PI) / 180,
          0
        );
        if (OVERLAY_FLIP_X) {
          mesh.scale.x = -1;
          mesh.material.side = THREE.BackSide;
        }
        globeGroup.add(mesh);
        meshes[key] = mesh;
      });
    }

    const PEAK = 0.92;

    // blend: 0 = full heat, 1 = full freeze, in between = a mix of both layers
    let blend = 0;
    function setBlend(t) {
      blend = t;
      if (globeOK && meshes.heat && meshes.freeze) {
        meshes.heat.material.opacity = (1 - t) * PEAK;
        meshes.freeze.material.opacity = t * PEAK;
      }
      // legend follows the dominant layer
      const cfg = t < 0.5 ? OVERLAYS.heat : OVERLAYS.freeze;
      document.getElementById("legendBar").style.background =
        "linear-gradient(90deg, " + cfg.stops.join(", ") + ")";
      document.getElementById("legendLo").textContent = cfg.lo;
      document.getElementById("legendHi").textContent = cfg.hi;
      document.getElementById("legendLabel").textContent = cfg.label;
      // loop-temp slider only matters while heat still contributes
      document.getElementById("tempctl").style.display = t < 1 ? "flex" : "none";
      scheduleRender();
    }

    const blendSlider = document.getElementById("blendSlider");
    blendSlider.addEventListener("input", () => {
      cancelAnimationFrame(blendAnim);
      setBlend(+blendSlider.value);
    });

    // Click (or press) the end icons to glide the slider to that end.
    let blendAnim = 0;
    function animateBlend(target) {
      cancelAnimationFrame(blendAnim);
      const start = blend, t0 = performance.now(), dur = 480;
      const step = (now) => {
        const p = Math.min(1, (now - t0) / dur);
        const e = p < 0.5 ? 2 * p * p : 1 - Math.pow(-2 * p + 2, 2) / 2; // easeInOut
        const v = start + (target - start) * e;
        blendSlider.value = String(v);
        setBlend(v);
        if (p < 1) blendAnim = requestAnimationFrame(step);
      };
      blendAnim = requestAnimationFrame(step);
    }
    document.querySelectorAll("#controls .ctl-ic.end").forEach((el) => {
      const go = () => animateBlend(el.dataset.end === "freeze" ? 1 : 0);
      el.addEventListener("click", go);
      el.addEventListener("keydown", (ev) => {
        if (ev.key === "Enter" || ev.key === " ") { ev.preventDefault(); go(); }
      });
    });
    // setBlend(0) is called once below, after `projName` exists (it calls
    // scheduleRender, which reads projName).

    // ---- loop-temperature slider --------------------------------------
    // Preload every frame (40..60 C) up front and pre-upload to the GPU so
    // dragging the slider just swaps an already-resident texture — no hitch.
    const T_MIN = 40, T_MAX = 60, T_DEFAULT = 45;
    const heatFrames = {};
    const fLoader = new THREE.TextureLoader();
    const frameAniso = globeOK ? world.renderer().capabilities.getMaxAnisotropy() : 1;
    for (let T = T_MIN; T <= T_MAX; T++) {
      const tex = fLoader.load(
        `overlay/heat_frames/loop_${T}.png`,
        (t) => {
          if (globeOK) { try { world.renderer().initTexture(t); } catch (e) {} }
          scheduleRender(); // refresh the flat view once this frame decodes
        }
      );
      tex.colorSpace = THREE.SRGBColorSpace;
      tex.anisotropy = frameAniso;
      heatFrames[T] = tex;
    }

    // freeze source image for the flat views (independent of the globe mesh)
    const freezeImage = new Image();
    freezeImage.onload = () => scheduleRender();
    freezeImage.src = OVERLAYS.freeze.url;

    let loopTemp = T_DEFAULT;
    function setLoopTemp(T) {
      loopTemp = T;
      const tex = heatFrames[T];
      if (tex && meshes.heat) {
        meshes.heat.material.map = tex;
        meshes.heat.material.needsUpdate = true;
      }
      document.getElementById("tempVal").textContent = T;
      document.getElementById("tempDry").textContent = (T - 2.5).toFixed(1);
      scheduleRender(); // keep the projected view in sync
    }

    const slider = document.getElementById("tempSlider");
    slider.addEventListener("input", () => setLoopTemp(+slider.value));

    // ---- Projections (flat views rendered with d3-geo) -----------------
    // Each non-globe projection inverse-samples the equirectangular frame into
    // a canvas, then strokes graticule + borders on top with d3.geoPath. The
    // Heat/Freeze toggle and the loop-temp slider drive every projection.
    const projCanvas = document.getElementById("projCanvas");
    const pctx = projCanvas.getContext("2d");
    const PROJ_W = 880, PROJ_H = 540;
    projCanvas.width = PROJ_W;
    projCanvas.height = PROJ_H;
    let projName = "globe";

    function makeProjection(name) {
      let p;
      if (name === "mercator") p = d3.geoMercator();
      else if (name === "robinson") p = d3.geoRobinson();
      else if (name === "august") p = d3.geoAugust();
      else if (name === "vandergrinten") p = d3.geoVanDerGrinten();
      else p = d3.geoEquirectangular();
      p.fitExtent([[12, 12], [PROJ_W - 12, PROJ_H - 12]], { type: "Sphere" });
      return p;
    }

    // heat-frame / freeze image -> ImageData (cached) for raster resampling
    const srcCache = {};
    function sourceImageData(which) {
      const key = which === "freeze" ? "freeze" : `loop_${loopTemp}`;
      if (srcCache[key]) return srcCache[key];
      const img = which === "freeze"
        ? freezeImage
        : (heatFrames[loopTemp] && heatFrames[loopTemp].image);
      if (!img || !img.complete || !(img.naturalWidth || img.width)) return null;
      const c = document.createElement("canvas");
      c.width = img.naturalWidth || img.width;
      c.height = img.naturalHeight || img.height;
      const cx = c.getContext("2d");
      cx.drawImage(img, 0, 0);
      const id = cx.getImageData(0, 0, c.width, c.height);
      srcCache[key] = id;
      return id;
    }

    // Per-projection geometry cache: the expensive inverse (lon/lat per output
    // pixel) depends only on the projection, not the heat frame — so compute it
    // once. Sliding temperature / toggling layer then just copies pixels.
    const geomCache = {};
    function projGeometry(name) {
      if (geomCache[name]) return geomCache[name];
      const proj = makeProjection(name);
      const U = new Float32Array(PROJ_W * PROJ_H);
      const V = new Float32Array(PROJ_W * PROJ_H);
      const M = new Uint8Array(PROJ_W * PROJ_H); // 1 = inside sphere
      for (let y = 0; y < PROJ_H; y++) {
        for (let x = 0; x < PROJ_W; x++) {
          const i = y * PROJ_W + x;
          const px = x + 0.5, py = y + 0.5;
          const ll = proj.invert([px, py]);
          if (!ll) continue;
          const lon = ll[0], lat = ll[1];
          if (lon < -180 || lon > 180 || lat < -90 || lat > 90) continue;
          // round-trip check: reject pixels outside the single world (cylindrical
          // projections like Mercator wrap and would otherwise tile/repeat).
          const fwd = proj([lon, lat]);
          if (!fwd || Math.abs(fwd[0] - px) > 1.5 || Math.abs(fwd[1] - py) > 1.5) continue;
          U[i] = (lon + 180) / 360;
          V[i] = (90 - lat) / 180;
          M[i] = 1;
        }
      }
      const g = { proj, U, V, M };
      geomCache[name] = g;
      return g;
    }

    function renderProjection() {
      if (projName === "globe" || typeof d3 === "undefined") return;
      const geom = projGeometry(projName);
      const path = d3.geoPath(geom.proj, pctx);
      pctx.clearRect(0, 0, PROJ_W, PROJ_H);

      // ocean disc (raster has transparent oceans, so dark shows through)
      pctx.beginPath(); path({ type: "Sphere" });
      pctx.fillStyle = "#0b0c0d"; pctx.fill();

      // blend heat + freeze layers by `blend` (0 = heat, 1 = freeze), sampling
      // each source at its own resolution and compositing over the dark disc.
      const heatSrc = blend < 1 ? sourceImageData("heat") : null;
      const freezeSrc = blend > 0 ? sourceImageData("freeze") : null;
      if (heatSrc || freezeSrc) {
        const out = pctx.getImageData(0, 0, PROJ_W, PROJ_H);
        const od = out.data;
        const U = geom.U, V = geom.V, M = geom.M, n = PROJ_W * PROJ_H;
        const hd = heatSrc && heatSrc.data, hw = heatSrc && heatSrc.width, hh = heatSrc && heatSrc.height;
        const fd = freezeSrc && freezeSrc.data, fw = freezeSrc && freezeSrc.width, fh = freezeSrc && freezeSrc.height;
        for (let i = 0; i < n; i++) {
          if (!M[i]) continue;
          let r = 0, g = 0, b = 0, wsum = 0;
          if (heatSrc) {
            let sx = (U[i] * hw) | 0; if (sx >= hw) sx = hw - 1;
            let sy = (V[i] * hh) | 0; if (sy >= hh) sy = hh - 1;
            const si = (sy * hw + sx) * 4;
            const w = (hd[si + 3] / 255) * (1 - blend);
            if (w > 0) { r += hd[si] * w; g += hd[si + 1] * w; b += hd[si + 2] * w; wsum += w; }
          }
          if (freezeSrc) {
            let sx = (U[i] * fw) | 0; if (sx >= fw) sx = fw - 1;
            let sy = (V[i] * fh) | 0; if (sy >= fh) sy = fh - 1;
            const si = (sy * fw + sx) * 4;
            const w = (fd[si + 3] / 255) * blend;
            if (w > 0) { r += fd[si] * w; g += fd[si + 1] * w; b += fd[si + 2] * w; wsum += w; }
          }
          if (wsum <= 0) continue; // ocean / no data -> keep dark
          const a = wsum > 1 ? 1 : wsum, inv = 1 - a, oi = i * 4;
          od[oi] = (r / wsum) * a + od[oi] * inv;
          od[oi + 1] = (g / wsum) * a + od[oi + 1] * inv;
          od[oi + 2] = (b / wsum) * a + od[oi + 2] * inv;
          od[oi + 3] = 255;
        }
        pctx.putImageData(out, 0, 0);
      }

      pctx.lineWidth = 0.6; pctx.strokeStyle = "rgba(232,237,242,0.08)";
      pctx.beginPath(); path(d3.geoGraticule10()); pctx.stroke();
      pctx.lineWidth = 0.6; pctx.strokeStyle = "rgba(232,237,242,0.16)";
      pctx.beginPath(); for (const f of FEATURES.state) path(f); pctx.stroke();
      pctx.lineWidth = 0.9; pctx.strokeStyle = "rgba(232,237,242,0.45)";
      pctx.beginPath(); for (const f of FEATURES.country) path(f); pctx.stroke();
      pctx.lineWidth = 1; pctx.strokeStyle = "rgba(232,237,242,0.22)";
      pctx.beginPath(); path({ type: "Sphere" }); pctx.stroke();
    }

    let rafPending = false;
    function scheduleRender() {
      if (projName === "globe") return;
      if (rafPending) return;
      rafPending = true;
      requestAnimationFrame(() => { rafPending = false; renderProjection(); });
    }

    const PROJ_NAMES = {
      globe: "Globe",
      mercator: "Mercator",
      robinson: "Robinson",
      august: "August",
      vandergrinten: "Van der Grinten",
    };
    const projNameEl = document.getElementById("projName");
    function showProjName(name) {
      projNameEl.textContent = PROJ_NAMES[name] || "";
    }

    function setProjection(name) {
      if (name === "globe" && !globeOK) name = "robinson"; // no WebGL -> flat map
      projName = name;
      const globeEl = document.getElementById("globe");
      const flatEl = document.getElementById("flat");
      if (name === "globe") {
        flatEl.style.display = "none";
        globeEl.style.display = "block";
        if (globeOK) world.controls().autoRotate = true;
      } else {
        if (globeOK) world.controls().autoRotate = false;
        globeEl.style.display = "none";
        flatEl.style.display = "flex";
        renderProjection();
      }
      document.querySelectorAll("#projctl .pseg").forEach((b) =>
        b.classList.toggle("active", b.dataset.view === name)
      );
      showProjName(name);
    }
    document.querySelectorAll("#projctl .pseg").forEach((b) => {
      b.addEventListener("click", () => setProjection(b.dataset.view));
      // hover previews the projection name above the map; revert on leave
      b.addEventListener("mouseenter", () => showProjName(b.dataset.view));
      b.addEventListener("mouseleave", () => showProjName(projName));
    });

    setBlend(0); // initial layer mix (full heat) + legend
    setLoopTemp(T_DEFAULT);

    // If the 3D globe is unavailable (no WebGL), hide the Globe button and
    // default to a flat projection so the page still works.
    if (!globeOK) {
      document.getElementById("globe").style.display = "none";
      const gb = document.querySelector('#projctl .pseg[data-view="globe"]');
      if (gb) gb.style.display = "none";
      setProjection("robinson");
    }
    showProjName(projName); // initial label (Globe by default)

    // the globe no longer blocks the page — clear the loader regardless
    document.getElementById("loading").classList.add("hidden");

    // always-current copyright year
    document.getElementById("year").textContent = new Date().getFullYear();
  </script>
</body>
</html>
