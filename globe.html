<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Thermocline — Globe</title>
  <style>
    :root {
      --bg: #1c1d1f;
      --fg: #e8edf2;
      --muted: #8b9097;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: "Helvetica Neue", Helvetica, "Inter", Arial, sans-serif;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* thermal sheen behind the globe */
    body::before {
      content: "";
      position: fixed;
      inset: -20%;
      background:
        radial-gradient(40% 50% at 22% 28%, rgba(240, 90, 40, 0.12), transparent 70%),
        radial-gradient(45% 55% at 78% 72%, rgba(45, 175, 230, 0.12), transparent 70%);
      filter: blur(50px);
      z-index: 0;
      pointer-events: none;
    }

    #globe {
      position: fixed;
      inset: 0;
      z-index: 1;
    }

    .overlay {
      position: fixed;
      z-index: 2;
      pointer-events: none;
    }

    .brand {
      top: clamp(24px, 5vw, 48px);
      left: clamp(24px, 5vw, 48px);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 0.98;
      font-size: clamp(30px, 5vw, 56px);
    }

    .brand .grad {
      background: linear-gradient(95deg, #ef4b2b 0%, #f1b13a 30%, #7bd44a 60%, #4fc3e3 82%, #2db4e6 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .brand .tm {
      font-size: 0.2em;
      font-weight: 600;
      color: var(--muted);
      vertical-align: super;
      margin-left: 0.1em;
    }

    .caption {
      bottom: clamp(24px, 5vw, 44px);
      left: clamp(24px, 5vw, 48px);
      color: var(--muted);
      font-size: 14px;
      max-width: 38ch;
      line-height: 1.5;
    }

    .loading {
      position: fixed;
      inset: 0;
      z-index: 3;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 15px;
      transition: opacity 0.4s ease;
    }
    .loading.hidden { opacity: 0; pointer-events: none; }
  </style>
</head>
<body>
  <div id="globe"></div>

  <div class="overlay brand">
    <span class="grad">Dry is cool.</span><span class="tm">™</span>
  </div>
  <div class="overlay caption">
    Heat rejection, everywhere it runs hot.
  </div>

  <div class="loading" id="loading">Loading globe…</div>

  <script src="https://unpkg.com/three@0.158.0/build/three.min.js"></script>
  <script src="https://unpkg.com/globe.gl@2.32.0/dist/globe.gl.min.js"></script>
  <script>
    const COUNTRIES_URL =
      "https://unpkg.com/globe.gl@2.32.0/example/datasets/ne_110m_admin_0_countries.geojson";

    const world = Globe()(document.getElementById("globe"))
      .backgroundColor("rgba(0,0,0,0)")
      .showGlobe(true)
      .showAtmosphere(true)
      .atmosphereColor("#4fc3e3")
      .atmosphereAltitude(0.18)
      .globeMaterial(
        new THREE.MeshPhongMaterial({ color: 0x16171a, transparent: true, opacity: 0.92 })
      );

    // gentle auto-rotation
    world.controls().autoRotate = true;
    world.controls().autoRotateSpeed = 0.55;
    world.controls().enableDamping = true;

    // color borders along the brand gradient by latitude band
    const gradStops = ["#ef4b2b", "#f1903a", "#f1b13a", "#aed24a", "#7bd44a", "#4fc3e3", "#2db4e6"];
    function bandColor(lat) {
      // map lat (-90..90) -> 0..1 -> gradient stop
      const t = (lat + 90) / 180;
      const i = Math.min(gradStops.length - 1, Math.floor(t * gradStops.length));
      return gradStops[i];
    }

    function centroidLat(feature) {
      try {
        const coords = feature.geometry.coordinates.flat(Infinity);
        let sum = 0, n = 0;
        for (let k = 1; k < coords.length; k += 2) { sum += coords[k]; n++; }
        return n ? sum / n : 0;
      } catch (e) { return 0; }
    }

    fetch(COUNTRIES_URL)
      .then((r) => r.json())
      .then((geo) => {
        const features = geo.features.filter((f) => f.properties.ISO_A2 !== "AQ");
        world
          .polygonsData(features)
          .polygonCapColor(() => "rgba(0,0,0,0)")
          .polygonSideColor(() => "rgba(0,0,0,0)")
          .polygonStrokeColor((f) => bandColor(centroidLat(f)))
          .polygonAltitude(0.006)
          .polygonsTransitionDuration(0);
        document.getElementById("loading").classList.add("hidden");
      })
      .catch(() => {
        document.getElementById("loading").textContent =
          "Couldn't load map data (needs network).";
      });

    // responsive sizing
    function size() {
      world.width(window.innerWidth).height(window.innerHeight);
    }
    window.addEventListener("resize", size);
    size();
    world.pointOfView({ lat: 25, lng: 10, altitude: 2.4 });
  </script>
</body>
</html>
