<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Thermocline — Globe</title>
  <style>
    :root {
      --bg: #1c1d1f;
      --fg: #e8edf2;
      --muted: #8b9097;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: "Helvetica Neue", Helvetica, "Inter", Arial, sans-serif;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* thermal sheen behind the globe */
    body::before {
      content: "";
      position: fixed;
      inset: -20%;
      background:
        radial-gradient(38% 38% at 50% 50%, rgba(79, 195, 227, 0.14), transparent 62%),
        radial-gradient(40% 50% at 22% 28%, rgba(240, 90, 40, 0.12), transparent 70%),
        radial-gradient(45% 55% at 78% 72%, rgba(45, 175, 230, 0.12), transparent 70%);
      filter: blur(50px);
      z-index: 0;
      pointer-events: none;
    }

    #globe {
      position: fixed;
      inset: 0;
      z-index: 1;
    }

    .overlay {
      position: fixed;
      z-index: 2;
      pointer-events: none;
    }

    .brand {
      top: clamp(24px, 5vw, 48px);
      left: clamp(24px, 5vw, 48px);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 0.98;
      font-size: clamp(30px, 5vw, 56px);
    }

    .brand .grad {
      background: linear-gradient(95deg, #ef4b2b 0%, #f1b13a 30%, #7bd44a 60%, #4fc3e3 82%, #2db4e6 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .brand .tm {
      font-size: 0.2em;
      font-weight: 600;
      color: var(--muted);
      vertical-align: super;
      margin-left: 0.1em;
    }

    .caption {
      bottom: clamp(24px, 5vw, 44px);
      left: clamp(24px, 5vw, 48px);
      color: var(--muted);
      font-size: 14px;
      max-width: 38ch;
      line-height: 1.5;
    }

    .loading {
      position: fixed;
      inset: 0;
      z-index: 3;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 15px;
      transition: opacity 0.4s ease;
    }
    .loading.hidden { opacity: 0; pointer-events: none; }

    /* segmented toggles (layer + view) */
    .controls,
    .viewctl {
      top: clamp(24px, 5vw, 48px);
      right: clamp(24px, 5vw, 48px);
      display: flex;
      gap: 6px;
      padding: 4px;
      border-radius: 999px;
      background: rgba(20, 22, 26, 0.6);
      border: 1px solid rgba(232, 237, 242, 0.1);
      backdrop-filter: blur(8px);
      pointer-events: auto;
    }
    /* view toggle sits just under the layer toggle */
    .viewctl {
      top: calc(clamp(24px, 5vw, 48px) + 50px);
    }

    .controls .seg,
    .viewctl .seg {
      appearance: none;
      border: 0;
      cursor: pointer;
      font: inherit;
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      background: transparent;
      padding: 7px 15px;
      border-radius: 999px;
      transition: color 0.2s ease, background 0.2s ease;
    }
    .controls .seg:hover,
    .viewctl .seg:hover { color: var(--fg); }
    .controls .seg.active,
    .viewctl .seg.active { color: #0e0f10; background: var(--fg); }

    /* flat (equirectangular) map view */
    .flatview {
      position: fixed;
      inset: 0;
      z-index: 1;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 9vh 4vw;
    }
    .flat-inner {
      position: relative;
      width: min(94vw, calc((100vh - 18vh) * 2));
      aspect-ratio: 2 / 1;
      background: #0b0c0d;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 12px 50px rgba(0, 0, 0, 0.55);
    }
    .flat-inner img,
    .flat-inner svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }
    #flatBorders path { fill: none; vector-effect: non-scaling-stroke; }
    #flatBorders .b-country { stroke: rgba(232, 237, 242, 0.45); stroke-width: 0.8px; }
    #flatBorders .b-state { stroke: rgba(232, 237, 242, 0.16); stroke-width: 0.6px; }

    /* legend */
    .legend {
      bottom: clamp(24px, 5vw, 44px);
      right: clamp(24px, 5vw, 48px);
      width: clamp(180px, 26vw, 240px);
      text-align: right;
    }
    .legend-bar {
      height: 7px;
      border-radius: 999px;
      margin-bottom: 7px;
    }
    .legend-ends {
      display: flex;
      justify-content: space-between;
      color: var(--muted);
      font-size: 11px;
      letter-spacing: 0.01em;
    }
    .legend-label {
      margin-top: 8px;
      color: var(--fg);
      font-size: 13px;
      font-weight: 600;
    }
    .legend-sub {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }

    /* loop-temperature slider */
    .tempctl {
      left: 50%;
      bottom: clamp(22px, 4vw, 40px);
      transform: translateX(-50%);
      width: min(440px, 78vw);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      pointer-events: auto;
    }
    .temp-label {
      font-size: 14px;
      font-weight: 600;
      color: var(--fg);
      letter-spacing: -0.01em;
    }
    .temp-label .temp-sub {
      color: var(--muted);
      font-weight: 400;
    }
    #tempSlider {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 6px;
      border-radius: 999px;
      outline: none;
      cursor: pointer;
      /* cold -> hot track */
      background: linear-gradient(90deg, #19c3e6, #38bdf8, #a3e635, #facc15, #f59e0b, #ef4444);
    }
    #tempSlider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--fg);
      border: 2px solid #0e0f10;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.5);
    }
    #tempSlider::-moz-range-thumb {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--fg);
      border: 2px solid #0e0f10;
    }
  </style>
</head>
<body>
  <div id="globe"></div>

  <div class="overlay brand">
    <span class="grad">Dry is cool.</span><span class="tm">™</span>
  </div>
  <div class="overlay caption">
    © <span id="year">2026</span> Thermocline
  </div>

  <div class="overlay controls" id="controls">
    <button class="seg active" data-layer="heat">Heat</button>
    <button class="seg" data-layer="freeze">Freeze</button>
  </div>

  <div class="overlay viewctl" id="viewctl">
    <button class="seg active" data-view="globe">Globe</button>
    <button class="seg" data-view="flat">Flat</button>
  </div>

  <div class="flatview" id="flat">
    <div class="flat-inner">
      <img id="flatImg" alt="World heat-rejection map" />
      <svg id="flatBorders" viewBox="0 0 360 180" preserveAspectRatio="none"></svg>
    </div>
  </div>

  <div class="overlay legend" id="legend">
    <div class="legend-bar" id="legendBar"></div>
    <div class="legend-ends"><span id="legendLo"></span><span id="legendHi"></span></div>
    <div class="legend-label" id="legendLabel"></div>
  </div>

  <div class="overlay tempctl" id="tempctl">
    <div class="temp-label">
      <span id="tempVal">45</span>&deg;C loop
      <span class="temp-sub">&middot; pure-dry to <span id="tempDry">42.5</span>&deg;C ambient</span>
    </div>
    <input id="tempSlider" type="range" min="40" max="60" step="1" value="45"
           aria-label="Loop temperature" />
  </div>

  <div class="loading" id="loading">Loading globe…</div>

  <script src="https://unpkg.com/three@0.158.0/build/three.min.js"></script>
  <script src="https://unpkg.com/globe.gl@2.32.0/dist/globe.gl.min.js"></script>
  <script>
    const COUNTRIES_URL =
      "https://unpkg.com/globe.gl@2.32.0/example/datasets/ne_110m_admin_0_countries.geojson";
    const US_STATES_URL =
      "https://cdn.jsdelivr.net/gh/PublicaMundi/MappingAPI@master/data/geojson/us-states.json";

    const world = Globe()(document.getElementById("globe"))
      .backgroundColor("rgba(0,0,0,0)")
      .showGlobe(true)
      // WebGL atmosphere disabled: its back-side fresnel shader punched dark
      // triangular "rays" through the transparent ocean of the overlay at some
      // angles. The CSS halo behind #globe provides the limb glow instead.
      .showAtmosphere(false)
      .globeMaterial(
        // opaque so the far side never shows through
        new THREE.MeshPhongMaterial({ color: 0x16171a })
      );

    // gentle auto-rotation
    world.controls().autoRotate = true;
    world.controls().autoRotateSpeed = 0.55;
    world.controls().enableDamping = true;

    // color borders along the brand gradient by latitude band
    const gradStops = ["#ef4b2b", "#f1903a", "#f1b13a", "#aed24a", "#7bd44a", "#4fc3e3", "#2db4e6"];
    function bandColor(lat) {
      // map lat (-90..90) -> 0..1 -> gradient stop
      const t = (lat + 90) / 180;
      const i = Math.min(gradStops.length - 1, Math.floor(t * gradStops.length));
      return gradStops[i];
    }

    function centroidLat(feature) {
      try {
        const coords = feature.geometry.coordinates.flat(Infinity);
        let sum = 0, n = 0;
        for (let k = 1; k < coords.length; k += 2) { sum += coords[k]; n++; }
        return n ? sum / n : 0;
      } catch (e) { return 0; }
    }

    // dim a hex color by alpha for secondary (state) borders
    function dim(hex, alpha) {
      const n = parseInt(hex.slice(1), 16);
      return `rgba(${(n >> 16) & 255}, ${(n >> 8) & 255}, ${n & 255}, ${alpha})`;
    }

    // --- flat (equirectangular) border SVG --------------------------------
    // lon/lat -> plate-carrée: x = lon+180 (0..360), y = 90-lat (0..180).
    // Break the path on antimeridian jumps so wrapping rings don't draw a
    // stray line across the map.
    function featurePath(f) {
      const g = f.geometry;
      if (!g) return "";
      const polys =
        g.type === "Polygon" ? [g.coordinates]
        : g.type === "MultiPolygon" ? g.coordinates
        : [];
      let d = "";
      for (const poly of polys) {
        for (const ring of poly) {
          let started = false, prevLon = null;
          for (const pt of ring) {
            const lon = pt[0], lat = pt[1];
            const x = (lon + 180).toFixed(2), y = (90 - lat).toFixed(2);
            if (!started || (prevLon !== null && Math.abs(lon - prevLon) > 180)) {
              d += `M${x} ${y} `;
              started = true;
            } else {
              d += `L${x} ${y} `;
            }
            prevLon = lon;
          }
        }
      }
      return d;
    }
    function buildFlatBorders(countryFeatures, stateFeatures) {
      const ns = "http://www.w3.org/2000/svg";
      const svg = document.getElementById("flatBorders");
      const add = (feats, cls) => {
        let d = "";
        for (const f of feats) d += featurePath(f);
        const p = document.createElementNS(ns, "path");
        p.setAttribute("d", d);
        p.setAttribute("class", cls);
        svg.appendChild(p);
      };
      add(stateFeatures, "b-state");
      add(countryFeatures, "b-country");
    }

    // Country + US-state borders, drawn as thin strokes ON TOP of the heatmap.
    Promise.all([
      fetch(COUNTRIES_URL).then((r) => r.json()),
      fetch(US_STATES_URL).then((r) => r.json()).catch(() => ({ features: [] })),
    ])
      .then(([countries, states]) => {
        const countryFeatures = (countries.features || [])
          .filter((f) => f.properties.ISO_A2 !== "AQ")
          .map((f) => ((f._kind = "country"), f));
        const stateFeatures = (states.features || []).map(
          (f) => ((f._kind = "state"), f)
        );

        // build the flat-map borders from the same data (equirectangular)
        buildFlatBorders(countryFeatures, stateFeatures);

        // Configure zero transition + all accessors BEFORE setting the data,
        // so the borders appear instantly in their final position — no enter
        // animation / altitude "grow-in" shift while rendering.
        world
          .polygonsTransitionDuration(0)
          .polygonCapColor(() => "rgba(0,0,0,0)")
          .polygonSideColor(() => "rgba(0,0,0,0)")
          .polygonStrokeColor((f) =>
            f._kind === "state"
              ? "rgba(232, 237, 242, 0.14)"
              : "rgba(232, 237, 242, 0.4)"
          )
          .polygonAltitude(() => 0.006)
          .polygonsData([...countryFeatures, ...stateFeatures]);

        // Lift the strokes above the heatmap (renderOrder) as soon as globe.gl
        // creates them, keeping depthTest on so the opaque globe occludes the
        // far-side lines. Runs each frame briefly so it catches them on the
        // very first frame they exist (no visible pop).
        let frames = 0;
        const liftBorders = () => {
          world.scene().traverse((o) => {
            if ((o.isLine || o.isLineSegments) && o.material) {
              o.renderOrder = 6;
              o.material.depthTest = true;
              o.material.transparent = true;
            }
          });
          if (++frames < 90) requestAnimationFrame(liftBorders);
        };
        requestAnimationFrame(liftBorders);

        document.getElementById("loading").classList.add("hidden");
      })
      .catch(() => {
        document.getElementById("loading").textContent =
          "Couldn't load border data (needs network).";
      });

    // responsive sizing
    function size() {
      world.width(window.innerWidth).height(window.innerHeight);
    }
    window.addEventListener("resize", size);
    size();
    world.pointOfView({ lat: 25, lng: 10, altitude: 2.4 });

    // ---- climate overlays (equirectangular textures painted on the sphere) ----
    const OVERLAYS = {
      heat: {
        url: "overlay/heat_frames/loop_45.png",
        label: "Adiabatic-assist demand",
        sub: "Where pure-dry cooling needs a hand.",
        stops: ["#19c3e6", "#38bdf8", "#a3e635", "#facc15", "#f59e0b", "#ef4444"],
        lo: "Pure dry",
        hi: "Adiabatic",
      },
      freeze: {
        url: "overlay/freeze_antifreeze_overlay.png",
        label: "Anti-freeze mode",
        sub: "Where glycol runs year-round.",
        stops: ["#1a2433", "#b794f4", "#9b6ef0", "#7c3aed", "#5b21b6", "#3b0a78"],
        lo: "Never",
        hi: "Year-round",
      },
    };

    // Find the base globe mesh, then attach overlays to its PARENT GROUP.
    // The country borders live in that group's frame, but the base mesh itself
    // carries a -90° spin the borders don't — so we attach to the group (not the
    // mesh) and re-apply a +90° rotation so the texture's longitude lines up.
    let baseGlobe = null;
    world.scene().traverse((o) => {
      if (
        o.isMesh &&
        o.geometry &&
        o.geometry.type === "SphereGeometry" &&
        o.geometry.parameters.radius === 100 &&
        o.material.type === "MeshPhongMaterial"
      ) {
        baseGlobe = o;
      }
    });
    const globeGroup = (baseGlobe && baseGlobe.parent) || world.scene();

    // ---- OVERLAY ALIGNMENT ----------------------------------------------
    // The climate textures are equirectangular, so lining them up with the
    // borders is purely a spin about the globe's polar axis. If the heatmap
    // drifts east/west of the coastlines, nudge OVERLAY_LON_DEG by a degree
    // or two until they match. Flip/lat knobs are here for completeness.
    const OVERLAY_LON_DEG = -90;  // longitude spin (deg); main alignment knob
    const OVERLAY_LAT_DEG = 0;    // tiny tilt if poles look off (usually 0)
    const OVERLAY_FLIP_X = false; // true if the map looks mirrored east/west
    // ---------------------------------------------------------------------

    const loader = new THREE.TextureLoader();
    const meshes = {};
    let bump = 0.4;
    Object.entries(OVERLAYS).forEach(([key, cfg]) => {
      const tex = loader.load(cfg.url);
      tex.colorSpace = THREE.SRGBColorSpace;
      tex.anisotropy = world.renderer().capabilities.getMaxAnisotropy();
      const mesh = new THREE.Mesh(
        new THREE.SphereGeometry(100 + bump, 128, 128),
        new THREE.MeshBasicMaterial({
          map: tex,
          transparent: true,
          depthTest: false, // front-face sphere just above the globe; no z-fight
          depthWrite: false,
          side: THREE.FrontSide, // only the near hemisphere draws
          opacity: 0,
        })
      );
      bump += 0.1;
      mesh.renderOrder = 3;
      // alignment (see OVERLAY_* knobs above)
      mesh.rotation.set(
        (OVERLAY_LAT_DEG * Math.PI) / 180,
        (OVERLAY_LON_DEG * Math.PI) / 180,
        0
      );
      if (OVERLAY_FLIP_X) {
        mesh.scale.x = -1;
        mesh.material.side = THREE.BackSide; // keep winding correct when mirrored
      }
      globeGroup.add(mesh);
      meshes[key] = mesh;
    });

    const PEAK = 0.92;
    let active = null;

    // lightweight opacity crossfade
    const fades = {};
    function fadeTo(key, target) {
      cancelAnimationFrame(fades[key]);
      const m = meshes[key].material;
      const start = m.opacity;
      const t0 = performance.now();
      const dur = 450;
      const step = (now) => {
        const p = Math.min(1, (now - t0) / dur);
        m.opacity = start + (target - start) * p;
        if (p < 1) fades[key] = requestAnimationFrame(step);
      };
      fades[key] = requestAnimationFrame(step);
    }

    function setLayer(key) {
      if (key === active) return;
      active = key;
      Object.keys(meshes).forEach((k) => fadeTo(k, k === key ? PEAK : 0));

      const cfg = OVERLAYS[key];
      document.getElementById("legendBar").style.background =
        "linear-gradient(90deg, " + cfg.stops.join(", ") + ")";
      document.getElementById("legendLo").textContent = cfg.lo;
      document.getElementById("legendHi").textContent = cfg.hi;
      document.getElementById("legendLabel").textContent = cfg.label;

      document.querySelectorAll("#controls .seg").forEach((b) =>
        b.classList.toggle("active", b.dataset.layer === key)
      );

      // the loop-temp slider only applies to the heat layer
      document.getElementById("tempctl").style.display =
        key === "heat" ? "flex" : "none";
    }

    document.querySelectorAll("#controls .seg").forEach((b) =>
      b.addEventListener("click", () => {
        setLayer(b.dataset.layer);
        renderFlat(); // keep flat view in sync when switching layers
      })
    );

    setLayer("heat");

    // ---- loop-temperature slider --------------------------------------
    // Preload every frame (40..60 C) up front and pre-upload to the GPU so
    // dragging the slider just swaps an already-resident texture — no hitch.
    const T_MIN = 40, T_MAX = 60, T_DEFAULT = 45;
    const heatFrames = {};
    const fLoader = new THREE.TextureLoader();
    const maxAniso = world.renderer().capabilities.getMaxAnisotropy();
    for (let T = T_MIN; T <= T_MAX; T++) {
      const tex = fLoader.load(
        `overlay/heat_frames/loop_${T}.png`,
        (t) => { try { world.renderer().initTexture(t); } catch (e) {} }
      );
      tex.colorSpace = THREE.SRGBColorSpace;
      tex.anisotropy = maxAniso;
      heatFrames[T] = tex;
    }

    let loopTemp = T_DEFAULT;
    function setLoopTemp(T) {
      loopTemp = T;
      const tex = heatFrames[T];
      if (tex && meshes.heat) {
        meshes.heat.material.map = tex;
        meshes.heat.material.needsUpdate = true;
      }
      document.getElementById("tempVal").textContent = T;
      document.getElementById("tempDry").textContent = (T - 2.5).toFixed(1);
      renderFlat(); // keep the flat map in sync
    }

    const slider = document.getElementById("tempSlider");
    slider.addEventListener("input", () => setLoopTemp(+slider.value));

    // ---- Globe / Flat view toggle -------------------------------------
    // The flat view is the same equirectangular texture (the PNG already IS a
    // flat map) with the border SVG over it — so Heat/Freeze + the slider drive
    // both views identically.
    let viewMode = "globe";
    function flatSrc() {
      return active === "freeze"
        ? OVERLAYS.freeze.url
        : `overlay/heat_frames/loop_${loopTemp}.png`;
    }
    function renderFlat() {
      if (viewMode !== "flat") return;
      document.getElementById("flatImg").src = flatSrc();
    }
    function setView(mode) {
      viewMode = mode;
      const globeEl = document.getElementById("globe");
      const flatEl = document.getElementById("flat");
      if (mode === "flat") {
        world.controls().autoRotate = false;
        globeEl.style.display = "none";
        flatEl.style.display = "flex";
        renderFlat();
      } else {
        flatEl.style.display = "none";
        globeEl.style.display = "block";
        world.controls().autoRotate = true;
      }
      document.querySelectorAll("#viewctl .seg").forEach((b) =>
        b.classList.toggle("active", b.dataset.view === mode)
      );
    }
    document.querySelectorAll("#viewctl .seg").forEach((b) =>
      b.addEventListener("click", () => setView(b.dataset.view))
    );

    setLoopTemp(T_DEFAULT);

    // always-current copyright year
    document.getElementById("year").textContent = new Date().getFullYear();
  </script>
</body>
</html>
